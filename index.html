<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandra's Website</title>
    <style>
      /* Main background changed to soft light blue */
      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        max-width: 700px;
        margin: 40px auto; 
        padding: 30px; 
        background-color: #f0f7fc; 
        color: #2c3e50;
      }
      
      /* White content card for better readability */
      .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      h1 { 
        color: #1a4a75; 
        margin-top: 0;
        font-size: 2.2rem;
      }

      h2 { 
        color: #2e75b6; 
        border-bottom: 2px solid #e1edf7; 
        padding-bottom: 6px;
        margin-top: 30px;
        font-size: 1.4rem;
      }

      p { 
        line-height: 1.7; 
        font-size: 1.05rem;
      }

      .profile-photo {
        display: block;
        max-width: 220px;
        height: auto;
        border-radius: 50%; /* Modern circular look */
        border: 4px solid #e1edf7;
        margin: 25px 0;
      }

      a {
        color: #2e75b6;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.2s ease;
      }

      a:hover {
        color: #1a4a75;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <!-- Wrapped content in a container for the modern card layout -->
    <div class="container">
      <h1>Hi, I'm Alexandra!</h1>
   
      <!-- Your updated photo link -->
      <img src="IMG_5069.jpeg" alt="Alexandra's profile picture" class="profile-photo">

      <h2>About Me</h2>
      <p>I am a teacher at the Energy Tech High School</p>
   
      <h2>My Interests</h2>
      <p>[What do you enjoy? List a few things.]</p>
   
      <h2>My Goals for This Course</h2>
      <p>[What do you want to build or learn?]</p>
   
      <h2>My GitHub</h2>
      <p>Check out my projects: 
        <a href="https://github.com/[your-username]">[Your Username]</a>
      </p>
    </div>
  </body>
</html>
